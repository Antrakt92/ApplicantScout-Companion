name: Build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: windows-2022
    permissions:
      contents: read
    outputs:
      release_commit: ${{ steps.release-identity.outputs.commit }}
      tag_version: ${{ steps.release-identity.outputs.version }}
      build_attempt: ${{ steps.release-identity.outputs.attempt }}
      paired_addon_tag: ${{ steps.paired-addon.outputs.ref }}
      paired_addon_commit: ${{ steps.paired-addon-identity.outputs.commit }}
    steps:
      - name: Checkout companion
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          path: ApplicantScout-Companion
          persist-credentials: false

      - name: Verify release tag is reachable from origin/main
        id: release-identity
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          if ($env:GITHUB_REF_NAME -notmatch '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$') {
            throw "Release tag must use canonical vX.Y.Z format: $env:GITHUB_REF_NAME"
          }
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Could not verify release tag ancestry: failed to fetch origin/main."
          }
          $ReleaseCommit = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0 -or $ReleaseCommit -notmatch '^[0-9a-f]{40}$') {
            throw "Could not verify release tag ancestry: failed to resolve release commit."
          }
          $TagCommit = (git rev-parse "$env:GITHUB_REF_NAME^{commit}").Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0 -or $TagCommit -ne $ReleaseCommit) {
            throw "Checked out commit $ReleaseCommit does not match release tag $env:GITHUB_REF_NAME ($TagCommit)."
          }
          $MainCommit = (git rev-parse refs/remotes/origin/main).Trim()
          if ($LASTEXITCODE -ne 0 -or -not $MainCommit) {
            throw "Could not verify release tag ancestry: failed to resolve origin/main."
          }
          git merge-base --is-ancestor $ReleaseCommit $MainCommit
          $ExitCode = $LASTEXITCODE
          if ($ExitCode -eq 1) {
            throw "Release tag commit $ReleaseCommit is not reachable from origin/main ($MainCommit)."
          }
          if ($ExitCode -ne 0) {
            throw "Could not verify release tag ancestry: git merge-base exited $ExitCode."
          }
          $Utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::AppendAllText(
            $env:GITHUB_OUTPUT,
            "commit=$ReleaseCommit`n" +
            "version=$($env:GITHUB_REF_NAME.Substring(1))`n" +
            "attempt=${{ github.run_attempt }}`n",
            $Utf8NoBom
          )
          Write-Host "Release tag commit $ReleaseCommit is reachable from origin/main ($MainCommit)."

      - name: Resolve paired addon tag
        id: paired-addon
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -PairedAddonRefOutputPath $env:GITHUB_OUTPUT

      - name: Refuse existing release
        shell: pwsh
        working-directory: ApplicantScout-Companion
        env:
          GH_TOKEN: ${{ github.token }}
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -RefuseExistingRelease -GitHubRepository $env:GITHUB_REPOSITORY

      - name: Wait for paired addon tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $Ref = "${{ steps.paired-addon.outputs.ref }}"
          $Deadline = (Get-Date).AddSeconds(120)
          do {
            gh api --silent "repos/Antrakt92/ApplicantScout-Addon/git/ref/tags/$Ref"
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Paired addon tag is available: $Ref"
              exit 0
            }
            if ((Get-Date) -ge $Deadline) {
              break
            }
            Start-Sleep -Seconds 5
          } while ($true)
          throw "Timed out waiting for paired addon tag: $Ref"

      - name: Checkout addon
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: Antrakt92/ApplicantScout-Addon
          ref: ${{ steps.paired-addon.outputs.ref }}
          fetch-depth: 0
          path: ApplicantScout-Addon
          persist-credentials: false

      - name: Verify paired addon tag is reachable from origin/main
        id: paired-addon-identity
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: |
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Could not verify paired addon tag ancestry: failed to fetch addon origin/main."
          }
          $ReleaseCommit = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0 -or $ReleaseCommit -notmatch '^[0-9a-f]{40}$') {
            throw "Could not verify paired addon tag ancestry: failed to resolve paired addon tag commit."
          }
          $TagCommit = (git rev-parse "${{ steps.paired-addon.outputs.ref }}^{commit}").Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0 -or $TagCommit -ne $ReleaseCommit) {
            throw "Checked out addon commit $ReleaseCommit does not match paired tag ($TagCommit)."
          }
          $MainCommit = (git rev-parse refs/remotes/origin/main).Trim()
          if ($LASTEXITCODE -ne 0 -or -not $MainCommit) {
            throw "Could not verify paired addon tag ancestry: failed to resolve addon origin/main."
          }
          git merge-base --is-ancestor $ReleaseCommit $MainCommit
          $ExitCode = $LASTEXITCODE
          if ($ExitCode -eq 1) {
            throw "Paired addon tag commit $ReleaseCommit is not reachable from addon origin/main ($MainCommit)."
          }
          if ($ExitCode -ne 0) {
            throw "Could not verify paired addon tag ancestry: git merge-base exited $ExitCode."
          }
          $Utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "commit=$ReleaseCommit`n", $Utf8NoBom)
          Write-Host "Paired addon tag commit $ReleaseCommit is reachable from origin/main ($MainCommit)."

      - name: Validate paired addon metadata
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -PairedAddonRoot ..\ApplicantScout-Addon

      - name: Set up Python
        # actions/setup-python v6 pinned to the upstream tag commit.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'

      - name: Install release dependencies
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install -r constraints-release.txt
          .\.venv\Scripts\python -m pip install -e '.[dev]' -c constraints-release.txt

      - name: Install Windows build tools
        shell: pwsh
        run: |
          choco install lua51 --version=5.1.5 -y --no-progress
          choco install innosetup --version=6.7.1 -y --no-progress

      - name: Check release metadata and tests
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          .\scripts\check.ps1 -AddonRoot ..\ApplicantScout-Addon -VisualMode Smoke
          .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME

      - name: Build unsigned Windows artifacts
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: .\scripts\build-windows.ps1 -SkipChecks

      - name: Validate release assets
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -RequireAssets

      - name: Extract release notes
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          $TagVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          $EscapedVersion = [regex]::Escape($TagVersion)
          $Pattern = "(?ms)^##\s+$EscapedVersion\s+-\s+.*?(?=^##\s+\d+\.\d+\.\d+\s+-\s+|\z)"
          $Notes = Get-Content -LiteralPath RELEASE_NOTES.md -Raw -Encoding UTF8
          $Match = [regex]::Match($Notes, $Pattern)
          if (-not $Match.Success) {
            throw "Could not find top release notes entry for $TagVersion."
          }
          $CanonicalBody = ($Match.Value.Trim() -replace "`r`n?", "`n") + "`n"
          $Utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllText("dist\release-body.md", $CanonicalBody, $Utf8NoBom)

      - name: Create credentialless build manifest
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          $Version = "${{ steps.release-identity.outputs.version }}"
          $Bundle = Join-Path $env:RUNNER_TEMP "release-build-bundle"
          New-Item -ItemType Directory -Path $Bundle | Out-Null
          Copy-Item -LiteralPath "dist\ApplicantScoutCompanionSetup-$Version.exe" -Destination $Bundle
          Copy-Item -LiteralPath "dist\ApplicantScoutCompanionSetup-$Version.exe.sha256" -Destination $Bundle
          Copy-Item -LiteralPath "dist\ApplicantScoutCompanion-$Version-portable.zip" -Destination $Bundle
          Copy-Item -LiteralPath "dist\release-body.md" -Destination $Bundle
          .\scripts\release-artifact-manifest.ps1 `
            -Mode Create `
            -Purpose Build `
            -Tag $env:GITHUB_REF_NAME `
            -CommitSha "${{ steps.release-identity.outputs.commit }}" `
            -PairedAddonTag "${{ steps.paired-addon.outputs.ref }}" `
            -PairedAddonCommit "${{ steps.paired-addon-identity.outputs.commit }}" `
            -WorkflowRunId "${{ github.run_id }}" `
            -WorkflowRunAttempt ${{ github.run_attempt }} `
            -RootPath $Bundle

      - name: Upload credentialless build bundle
        # actions/upload-artifact v7.0.1 pinned to the upstream release commit.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: companion-release-build-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release-build-bundle/*
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

  draft:
    needs: build
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      RELEASE_COMMIT: ${{ needs.build.outputs.release_commit }}
      TAG_VERSION: ${{ needs.build.outputs.tag_version }}
      BUILD_ATTEMPT: ${{ needs.build.outputs.build_attempt }}
      PAIRED_ADDON_TAG: ${{ needs.build.outputs.paired_addon_tag }}
      PAIRED_ADDON_COMMIT: ${{ needs.build.outputs.paired_addon_commit }}
    steps:
      - name: Checkout companion
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          path: ApplicantScout-Companion
          persist-credentials: false

      - name: Revalidate release and paired tag identities
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          git fetch --force --no-tags origin "+refs/tags/$env:RELEASE_TAG`:refs/tags/$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not refresh release tag $env:RELEASE_TAG."
          }
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Could not refresh origin/main."
          }
          $HeadCommit = (git rev-parse HEAD).Trim().ToLowerInvariant()
          $TagCommit = (git rev-parse "$env:RELEASE_TAG^{commit}").Trim().ToLowerInvariant()
          if ($HeadCommit -ne $env:RELEASE_COMMIT -or $TagCommit -ne $env:RELEASE_COMMIT) {
            throw "Release tag moved after build: expected $env:RELEASE_COMMIT, HEAD=$HeadCommit, tag=$TagCommit."
          }
          git merge-base --is-ancestor $TagCommit refs/remotes/origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag commit is no longer reachable from origin/main."
          }

          $AddonRefs = @(git ls-remote https://github.com/Antrakt92/ApplicantScout-Addon.git "refs/tags/$env:PAIRED_ADDON_TAG" "refs/tags/$env:PAIRED_ADDON_TAG^{}")
          if ($LASTEXITCODE -ne 0 -or $AddonRefs.Count -lt 1) {
            throw "Could not resolve current paired addon tag $env:PAIRED_ADDON_TAG."
          }
          $Peeled = $AddonRefs | Where-Object { $_ -match '\^\{\}$' } | Select-Object -First 1
          $Selected = if ($Peeled) { $Peeled } else { $AddonRefs | Select-Object -First 1 }
          $AddonCommit = (($Selected -split '\s+')[0]).ToLowerInvariant()
          if ($AddonCommit -ne $env:PAIRED_ADDON_COMMIT) {
            throw "Paired addon tag moved after build: expected $env:PAIRED_ADDON_COMMIT, got $AddonCommit."
          }

      - name: Refuse existing release before writer boundary
        shell: pwsh
        working-directory: ApplicantScout-Companion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .\scripts\check-release-version.ps1 -Tag $env:RELEASE_TAG -RefuseExistingRelease -GitHubRepository $env:GITHUB_REPOSITORY

      - name: Download credentialless build bundle
        # actions/download-artifact v8.0.1 pinned to the upstream release commit.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: companion-release-build-attempt-${{ needs.build.outputs.build_attempt }}
          path: ${{ runner.temp }}/release-build-bundle

      - name: Verify credentialless build manifest
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          .\scripts\release-artifact-manifest.ps1 `
            -Mode Verify `
            -Purpose Build `
            -Tag $env:RELEASE_TAG `
            -CommitSha $env:RELEASE_COMMIT `
            -PairedAddonTag $env:PAIRED_ADDON_TAG `
            -PairedAddonCommit $env:PAIRED_ADDON_COMMIT `
            -WorkflowRunId "${{ github.run_id }}" `
            -WorkflowRunAttempt $env:BUILD_ATTEMPT `
            -RootPath (Join-Path $env:RUNNER_TEMP "release-build-bundle")

      - name: Sign installer and refresh checksum
        shell: pwsh
        working-directory: ApplicantScout-Companion
        env:
          APSCOUT_SIGNING_CERT_SHA1: ${{ secrets.APSCOUT_SIGNING_CERT_SHA1 }}
          APSCOUT_SIGNING_TIMESTAMP_URL: ${{ secrets.APSCOUT_SIGNING_TIMESTAMP_URL }}
          APSCOUT_SIGNTOOL_PATH: ${{ secrets.APSCOUT_SIGNTOOL_PATH }}
        run: |
          $Bundle = Join-Path $env:RUNNER_TEMP "release-build-bundle"
          .\scripts\sign-windows-installer.ps1 `
            -InstallerPath (Join-Path $Bundle "ApplicantScoutCompanionSetup-$env:TAG_VERSION.exe") `
            -ChecksumPath (Join-Path $Bundle "ApplicantScoutCompanionSetup-$env:TAG_VERSION.exe.sha256")

      - name: Create exact-tag release manifest
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          $Bundle = Join-Path $env:RUNNER_TEMP "release-build-bundle"
          $Assets = Join-Path $env:RUNNER_TEMP "release-assets"
          New-Item -ItemType Directory -Path $Assets | Out-Null
          Copy-Item -LiteralPath (Join-Path $Bundle "ApplicantScoutCompanionSetup-$env:TAG_VERSION.exe") -Destination $Assets
          Copy-Item -LiteralPath (Join-Path $Bundle "ApplicantScoutCompanionSetup-$env:TAG_VERSION.exe.sha256") -Destination $Assets
          Copy-Item -LiteralPath (Join-Path $Bundle "ApplicantScoutCompanion-$env:TAG_VERSION-portable.zip") -Destination $Assets
          .\scripts\release-artifact-manifest.ps1 `
            -Mode Create `
            -Purpose Release `
            -Tag $env:RELEASE_TAG `
            -CommitSha $env:RELEASE_COMMIT `
            -PairedAddonTag $env:PAIRED_ADDON_TAG `
            -PairedAddonCommit $env:PAIRED_ADDON_COMMIT `
            -WorkflowRunId "${{ github.run_id }}" `
            -WorkflowRunAttempt ${{ github.run_attempt }} `
            -RootPath $Assets `
            -ReleaseBodyPath (Join-Path $Bundle "release-body.md")

      - name: Verify exact-tag release manifest
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          $Assets = Join-Path $env:RUNNER_TEMP "release-assets"
          .\scripts\release-artifact-manifest.ps1 `
            -Mode Verify `
            -Purpose Release `
            -Tag $env:RELEASE_TAG `
            -CommitSha $env:RELEASE_COMMIT `
            -PairedAddonTag $env:PAIRED_ADDON_TAG `
            -PairedAddonCommit $env:PAIRED_ADDON_COMMIT `
            -WorkflowRunId "${{ github.run_id }}" `
            -WorkflowRunAttempt ${{ github.run_attempt }} `
            -RootPath $Assets
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item -LiteralPath (Join-Path $Assets "ApplicantScoutCompanionSetup-$env:TAG_VERSION.exe") -Destination dist
          Copy-Item -LiteralPath (Join-Path $Assets "ApplicantScoutCompanionSetup-$env:TAG_VERSION.exe.sha256") -Destination dist
          Copy-Item -LiteralPath (Join-Path $Assets "ApplicantScoutCompanion-$env:TAG_VERSION-portable.zip") -Destination dist
          .\scripts\check-release-version.ps1 -Tag $env:RELEASE_TAG -RequireAssets

      - name: Upload authoritative release assets
        # actions/upload-artifact v7.0.1 pinned to the upstream release commit.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: companion-release-assets-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Create draft release with assets
        shell: pwsh
        working-directory: ApplicantScout-Companion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $Assets = Join-Path $env:RUNNER_TEMP "release-assets"
          $ManifestPath = Join-Path $Assets "ApplicantScoutCompanion-$env:TAG_VERSION-release-manifest.json"
          $Manifest = Get-Content -LiteralPath $ManifestPath -Raw -Encoding UTF8 | ConvertFrom-Json
          $Title = [string]$Manifest.releaseCopy.title
          $Body = Join-Path $env:RUNNER_TEMP "authoritative-release-body.md"
          [System.IO.File]::WriteAllBytes(
            $Body,
            [Convert]::FromBase64String([string]$Manifest.releaseCopy.body.contentBase64)
          )
          gh release create $env:RELEASE_TAG `
            (Join-Path $Assets "ApplicantScoutCompanionSetup-$env:TAG_VERSION.exe") `
            (Join-Path $Assets "ApplicantScoutCompanionSetup-$env:TAG_VERSION.exe.sha256") `
            (Join-Path $Assets "ApplicantScoutCompanion-$env:TAG_VERSION-portable.zip") `
            (Join-Path $Assets "ApplicantScoutCompanion-$env:TAG_VERSION-release-manifest.json") `
            --repo $env:GITHUB_REPOSITORY `
            --title $Title `
            --notes-file $Body `
            --draft `
            --verify-tag

      - name: Verify draft release assets
        shell: pwsh
        working-directory: ApplicantScout-Companion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .\scripts\check-release-version.ps1 -Tag $env:RELEASE_TAG -RequireDraftReleaseAssets -GitHubRepository $env:GITHUB_REPOSITORY

      - name: Verify remote draft bytes against authoritative manifest
        shell: pwsh
        working-directory: ApplicantScout-Companion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $RemoteAssets = Join-Path $env:RUNNER_TEMP "remote-draft-assets"
          New-Item -ItemType Directory -Path $RemoteAssets | Out-Null
          gh release download $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --dir $RemoteAssets
          if ($LASTEXITCODE -ne 0) {
            throw "Could not download the draft release assets for verification."
          }
          .\scripts\release-artifact-manifest.ps1 `
            -Mode Verify `
            -Purpose Release `
            -Tag $env:RELEASE_TAG `
            -CommitSha $env:RELEASE_COMMIT `
            -PairedAddonTag $env:PAIRED_ADDON_TAG `
            -PairedAddonCommit $env:PAIRED_ADDON_COMMIT `
            -WorkflowRunId "${{ github.run_id }}" `
            -WorkflowRunAttempt ${{ github.run_attempt }} `
            -RootPath $RemoteAssets
          $Authoritative = Join-Path $env:RUNNER_TEMP "release-assets"
          $ManifestPath = Join-Path $Authoritative "ApplicantScoutCompanion-$env:TAG_VERSION-release-manifest.json"
          $Manifest = Get-Content -LiteralPath $ManifestPath -Raw -Encoding UTF8 | ConvertFrom-Json
          $ExpectedBody = [System.Text.Encoding]::UTF8.GetString(
            [Convert]::FromBase64String([string]$Manifest.releaseCopy.body.contentBase64)
          )
          $Release = gh release view $env:RELEASE_TAG `
            --repo $env:GITHUB_REPOSITORY `
            --json name,body,isDraft,isPrerelease | ConvertFrom-Json
          if (
            $LASTEXITCODE -ne 0 -or
            -not [bool]$Release.isDraft -or
            [bool]$Release.isPrerelease -or
            [string]$Release.name -cne [string]$Manifest.releaseCopy.title -or
            [string]$Release.body -cne $ExpectedBody
          ) {
            throw "Draft release title/body differs from the authoritative exact-tag manifest."
          }
          foreach ($File in Get-ChildItem -LiteralPath $Authoritative -File) {
            $RemoteFile = Join-Path $RemoteAssets $File.Name
            $ExpectedHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $File.FullName).Hash
            $ActualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $RemoteFile).Hash
            if ($ExpectedHash -ne $ActualHash -or $File.Length -ne (Get-Item -LiteralPath $RemoteFile).Length) {
              throw "Remote draft asset differs from the authoritative Actions artifact: $($File.Name)"
            }
          }
